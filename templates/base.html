<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Hospital CRM{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f6f8fa;
        }

        .page-title {
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .metric-card .card-body {
            min-height: 112px;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.1;
        }

        .detail-label {
            width: 220px;
            color: #495057;
            background: #f8f9fa;
        }

        .reason-list {
            margin-bottom: 0;
            padding-left: 1.25rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">Hospital CRM</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#globalNav" aria-controls="globalNav" aria-expanded="false" aria-label="ナビゲーション切替">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="globalNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">ダッシュボード</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'hospitals:hospital_list' %}">病院</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'corporations:corporation_list' %}">法人</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'contacts:contact_list' %}">担当者</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'visits:visit_list' %}">訪問記録</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'referrals:referral_list' %}">紹介記録</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'analytics:analytics_list' %}">営業分析</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'importer:hospital_csv_import' %}">CSVインポート</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'importer:hospital_csv_review' %}">CSVレビュー</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'importer:hospital_pdf_convert' %}">PDF変換</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'importer:import_session_list' %}">インポート履歴</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'admin:index' %}">Django Admin</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% if messages %}
            {% for message in messages %}
            <div class="alert {% if 'error' in message.tags %}alert-danger{% elif 'success' in message.tags %}alert-success{% elif 'warning' in message.tags %}alert-warning{% else %}alert-info{% endif %} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="閉じる"></button>
            </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
