<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Hospital CRM{% endblock %}</title>
    <style>
        body {
            font-family: Arial, "Yu Gothic", "Meiryo", sans-serif;
            margin: 0;
            color: #222;
            background: #f7f7f7;
        }

        header {
            background: #1f4e5f;
            color: #fff;
            padding: 16px 24px;
        }

        header h1 {
            margin: 0 0 12px;
            font-size: 24px;
        }

        nav a {
            color: #fff;
            margin-right: 18px;
            text-decoration: none;
            font-weight: bold;
        }

        main {
            padding: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #eef3f5;
        }

        .summary {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 16px;
        }

        .summary-item {
            min-width: 160px;
            background: #fff;
            border: 1px solid #ddd;
            padding: 16px;
        }

        .summary-item strong {
            display: block;
            font-size: 28px;
            margin-top: 8px;
        }

        .detail-table {
            margin-bottom: 24px;
        }

        .detail-table th {
            width: 220px;
        }

        .section-heading {
            margin-top: 32px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Hospital CRM</h1>
        <nav>
            <a href="{% url 'dashboard' %}">ダッシュボード</a>
            <a href="{% url 'analytics:analytics_list' %}">営業分析</a>
            <a href="{% url 'hospitals:hospital_list' %}">病院</a>
            <a href="{% url 'corporations:corporation_list' %}">法人</a>
            <a href="{% url 'visits:visit_list' %}">訪問記録</a>
            <a href="{% url 'admin:index' %}">Django Admin</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
