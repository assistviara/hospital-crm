{% extends "base.html" %}

{% block title %}ダッシュボード | Hospital CRM{% endblock %}

{% block content %}
<h2>Hospital CRM</h2>

<div class="summary">
    <div class="summary-item">
        病院数
        <strong>{{ hospital_count }}</strong>
    </div>
    <div class="summary-item">

    </div>
</div>
{% endblock %}
